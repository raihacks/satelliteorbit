<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base" content="/api/satellites">
  <title>Satellite Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="control-panel">
      <h1>Satellite Tracker 3D</h1>

      <label for="norad">NORAD IDs</label>
      <div class="input-row">
        <input id="norad" placeholder="e.g. 25544, 20580, 18356" inputmode="numeric">
        <button id="track-btn">Track</button>
      </div>

      <div id="status" class="status">Loading satellites automatically...</div>
      <div id="sat-list" class="sat-list"></div>

      <dl class="telemetry">
        <div>
          <dt>NORAD</dt>
          <dd id="selected-norad">—</dd>
        </div>
        <div>
          <dt>Latitude</dt>
          <dd id="latitude">—</dd>
        </div>
        <div>
          <dt>Longitude</dt>
          <dd id="longitude">—</dd>
        </div>
        <div>
          <dt>Altitude</dt>
          <dd id="altitude">—</dd>
        </div>
      </dl>
    </aside>

    <div class="viewer" id="viewer"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
  <script src="main.js"></script>
</body>
</html>
